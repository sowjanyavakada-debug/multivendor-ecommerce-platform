<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopHub - My Orders</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Shared Navbar Wrapper -->
  <nav class="navbar navbar-expand-lg navbar-dark"></nav>

  <!-- My Orders Content -->
  <div class="container my-5 flex-grow-1 animate-fade-up">
    <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap">
      <div>
        <h2 class="fw-bold mb-1"><i class="bi bi-box-seam text-primary"></i> My Orders</h2>
        <p class="text-muted mb-0">Track your shipment details, delivery progress, and past purchases.</p>
      </div>
      <div>
        <a href="shop.html" class="btn btn-premium-primary btn-sm"><i class="bi bi-bag-plus"></i> Continue Shopping</a>
      </div>
    </div>
    
    <hr class="my-4" style="border-color: var(--border-color);">

    <!-- Orders Section -->
    <div class="row">
      <div class="col-lg-12">
        <div id="orders-container">
          <!-- Dynamically populated or loading spinner -->
          <div class="text-center py-5">
            <div class="spinner-border text-primary mb-3" role="status"></div>
            <p class="text-muted">Fetching your order history...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Shared Footer Wrapper -->
  <footer></footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/myorders.js"></script>
</body>
</html>
