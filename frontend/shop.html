<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopHub - Catalog Search</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Shared Navbar Wrapper -->
  <nav class="navbar navbar-expand-lg navbar-dark"></nav>

  <!-- Main Catalog Content -->
  <div class="container my-5 flex-grow-1">
    <div class="row g-4">
      
      <!-- Left Sidebar Filters -->
      <div class="col-lg-3">
        <div class="filter-sidebar animate-fade-up">
          <h5 class="fw-bold mb-3 d-flex align-items-center justify-content-between">
            <span><i class="bi bi-funnel"></i> Filters</span>
            <button class="btn btn-sm btn-link text-primary text-decoration-none p-0" id="btn-reset-filters">Reset All</button>
          </h5>
          
          <!-- Search input with autocomplete -->
          <div class="mb-4 position-relative">
            <label for="searchQuery" class="form-label fw-semibold">Search Product</label>
            <div class="input-group">
              <input type="text" class="form-control" id="searchQuery" placeholder="Type name..." autocomplete="off">
              <span class="input-group-text"><i class="bi bi-search"></i></span>
            </div>
            <!-- Suggestion box -->
            <div id="autocomplete-suggestion-box" class="suggestion-box" style="display: none;"></div>
          </div>

          <!-- Category dropdown -->
          <div class="mb-4">
            <label for="filterCategory" class="form-label fw-semibold">Category</label>
            <select class="form-select" id="filterCategory">
              <option value="">All Categories</option>
              <option value="Electronics">Electronics</option>
              <option value="Fashion">Fashion</option>
              <option value="Home & Kitchen">Home & Kitchen</option>
              <option value="Clothing">Clothing</option>
              <option value="Accessories">Accessories</option>
            </select>
          </div>

          <!-- Price range -->
          <div class="mb-4">
            <label class="form-label fw-semibold">Price Range</label>
            <div class="d-flex gap-2 align-items-center">
              <input type="number" class="form-control" id="filterMinPrice" placeholder="Min" min="0">
              <span class="text-muted">-</span>
              <input type="number" class="form-control" id="filterMaxPrice" placeholder="Max" min="0">
            </div>
          </div>

          <!-- Sorting -->
          <div class="mb-4">
            <label for="filterSort" class="form-label fw-semibold">Sort By</label>
            <select class="form-select" id="filterSort">
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
              <option value="price_asc">Price: Low to High</option>
              <option value="price_desc">Price: High to Low</option>
              <option value="name_asc">Name: A to Z</option>
              <option value="name_desc">Name: Z to A</option>
            </select>
          </div>

          <button class="btn btn-premium-primary w-100" id="btn-apply-filters">Apply Filters</button>
        </div>
      </div>

      <!-- Right Catalog Display -->
      <div class="col-lg-9">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h3 class="fw-bold mb-0">Products Catalog</h3>
          <span class="text-muted fw-medium" id="catalog-count-info">Showing 0 products</span>
        </div>

        <div class="row g-4" id="catalog-grid">
          <!-- Loaded dynamically -->
          <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
          </div>
        </div>

        <!-- Pagination -->
        <div id="pagination-container" class="d-flex justify-content-center mt-5"></div>
      </div>

    </div>
  </div>

  <!-- Shared Footer Wrapper -->
  <footer></footer>

  <!-- Product Details Modal -->
  <div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content rounded-4 border-0 shadow-lg">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold" id="modalTitle">Product Title</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <div class="row g-4">
            <div class="col-md-5 text-center">
              <img id="modalImage" src="" class="img-fluid rounded-3 shadow-sm border" style="max-height: 280px; object-fit: contain; width: 100%;">
            </div>
            <div class="col-md-7">
              <span id="modalCategory" class="badge bg-primary-subtle text-primary mb-2">Category</span>
              <div class="mb-3 small">
                <span class="text-muted">Sold by:</span>
                <a href="#" id="modalVendorStoreLink" class="fw-semibold text-primary text-decoration-none">Store Name</a>
              </div>
              <h3 id="modalPrice" class="fw-bold text-success mb-3">Price</h3>
              <p id="modalDescription" class="text-muted mb-4">Description text</p>
              
              <!-- Review Breakdown Summary -->
              <div class="mb-4">
                <h5 class="fw-bold mb-3">Rating Summary</h5>
                <div class="d-flex align-items-center gap-3 mb-3">
                  <div class="text-center">
                    <h1 id="avgRatingText" class="display-4 fw-bold mb-0">0.0</h1>
                    <div class="star-rating fs-5" id="avgStarsContainer"></div>
                    <small class="text-muted" id="totalReviewsText">0 reviews</small>
                  </div>
                  <div class="flex-grow-1" id="breakdownContainer">
                    <!-- Progress bars loaded via JS -->
                  </div>
                </div>
              </div>

              <!-- Action buttons -->
              <div class="d-flex gap-3 mb-4">
                <button class="btn btn-premium-primary flex-grow-1" id="modalAddToCartBtn">Add to Cart</button>
                <button class="btn btn-outline-danger" id="modalAddToWishlistBtn" title="Add to Wishlist"><i class="bi bi-heart-fill"></i></button>
              </div>
            </div>
          </div>

          <hr class="my-4">

          <!-- Submit Review Section -->
          <div class="mb-4">
            <h5 class="fw-bold mb-3">Submit a Review</h5>
            <form id="submitReviewForm">
              <div class="mb-3">
                <label class="form-label fw-semibold">Your Rating</label>
                <div class="d-flex gap-2 fs-4 text-warning" id="ratingStarPicker">
                  <i class="bi bi-star cursor-pointer" data-val="1"></i>
                  <i class="bi bi-star cursor-pointer" data-val="2"></i>
                  <i class="bi bi-star cursor-pointer" data-val="3"></i>
                  <i class="bi bi-star cursor-pointer" data-val="4"></i>
                  <i class="bi bi-star cursor-pointer" data-val="5"></i>
                </div>
                <input type="hidden" id="selectedRating" value="5" required>
              </div>
              <div class="mb-3">
                <label for="reviewText" class="form-label fw-semibold">Your Review</label>
                <textarea class="form-control" id="reviewText" rows="3" placeholder="Share your experience with this product..." required></textarea>
              </div>
              <button type="submit" class="btn btn-premium-primary btn-sm">Submit Review</button>
            </form>
          </div>

          <h5 class="fw-bold mb-3">Customer Reviews</h5>
          <div id="modalReviewsList" style="max-height: 250px; overflow-y: auto;">
            <!-- Reviews dynamically populated -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/shop.js"></script>
</body>
</html>
