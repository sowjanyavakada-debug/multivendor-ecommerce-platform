<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopHub - Cart & Wishlist</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Shared Navbar Wrapper -->
  <nav class="navbar navbar-expand-lg navbar-dark"></nav>

  <!-- Cart Content -->
  <div class="container my-5 flex-grow-1 animate-fade-up">
    <h2 class="fw-bold mb-4"><i class="bi bi-cart3 text-primary"></i> Your Shopping Cart</h2>

    <div class="row g-4 mb-5">
      
      <!-- Cart Items List (Left) -->
      <div class="col-lg-8">
        <div class="premium-card p-4">
          <div class="table-responsive">
            <table class="custom-table mb-0" id="cart-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Category</th>
                  <th>Price</th>
                  <th style="width: 120px;">Quantity</th>
                  <th>Total</th>
                  <th style="width: 80px;">Action</th>
                </tr>
              </thead>
              <tbody id="cart-items-container">
                <!-- Dynamically populated -->
                <tr>
                  <td colspan="6" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Checkout Summary (Right) -->
      <div class="col-lg-4">
        
        <!-- Coupon Form -->
        <div class="premium-card p-4 mb-4">
          <h5 class="fw-bold mb-3">Apply Coupon</h5>
          <div class="input-group">
            <input type="text" class="form-control" id="couponCodeInput" placeholder="e.g. SAVE10">
            <button class="btn btn-premium-primary" type="button" id="btn-apply-coupon">Apply</button>
          </div>
          <small class="form-text mt-2 d-block text-success d-none" id="couponSuccessMessage"></small>
          <small class="form-text mt-2 d-block text-danger d-none" id="couponErrorMessage"></small>
        </div>

        <!-- Checkout Form & Totals -->
        <div class="premium-card p-4">
          <h5 class="fw-bold mb-4">Checkout Summary</h5>
          
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Subtotal</span>
            <span class="fw-semibold" id="checkout-subtotal">₹0.00</span>
          </div>
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Discount</span>
            <span class="fw-semibold text-success" id="checkout-discount">-₹0.00</span>
          </div>
          <hr class="my-3">
          <div class="d-flex justify-content-between mb-4">
            <span class="fw-bold fs-5">Estimated Total</span>
            <span class="fw-bold fs-5 text-primary" id="checkout-total">₹0.00</span>
          </div>

          <form id="checkout-form">
            <h6 class="fw-bold mb-3">Delivery Information</h6>
            <div class="mb-3">
              <label for="shippingName" class="form-label">Recipient Name</label>
              <input type="text" class="form-control" id="shippingName" placeholder="Full Name" required>
            </div>
            <div class="mb-3">
              <label for="shippingAddress" class="form-label">Delivery Address</label>
              <textarea class="form-control" id="shippingAddress" rows="3" placeholder="Street, City, Postal Code" required></textarea>
            </div>
            <div class="mb-3">
              <label for="shippingPhone" class="form-label">Phone Number</label>
              <input type="text" class="form-control" id="shippingPhone" placeholder="Mobile number" required>
            </div>
            <div class="mb-3">
              <label for="shippingMethod" class="form-label">Shipping Speed</label>
              <select class="form-select" id="shippingMethod">
                <option value="Standard">Standard Delivery (Flat)</option>
                <option value="Express">Express Delivery (+₹10.00 surcharge)</option>
              </select>
            </div>
            <div class="mb-4">
              <label for="paymentMethod" class="form-label">Payment Option</label>
              <select class="form-select" id="paymentMethod">
                <option value="COD">Cash on Delivery (COD)</option>
                <option value="Wallet">Wallet Balance</option>
                <option value="Razorpay">Razorpay Checkout (Simulation)</option>
                <option value="Stripe">Stripe Checkout (Simulation)</option>
                <option value="PayPal">PayPal Checkout (Simulation)</option>
              </select>
            </div>
            <button type="submit" class="btn btn-success w-100 py-2 fw-semibold" id="btn-place-order">Place Order securely</button>
          </form>
        </div>

      </div>

    </div>

    <!-- Wishlist Section -->
    <h3 class="fw-bold mb-4 mt-5"><i class="bi bi-heart text-danger"></i> Your Wishlist</h3>
    <div class="premium-card p-4">
      <div class="table-responsive">
        <table class="custom-table mb-0" id="wishlist-table">
          <thead>
            <tr>
              <th>Product</th>
              <th>Category</th>
              <th>Price</th>
              <th style="width: 150px;">Status</th>
              <th style="width: 150px;">Action</th>
            </tr>
          </thead>
          <tbody id="wishlist-items-container">
            <!-- Dynamically populated -->
            <tr>
              <td colspan="5" class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Shared Footer Wrapper -->
  <footer></footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
